apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-child
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/siocar/kustomize.git
    targetRevision: HEAD
    path: ./dev
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true